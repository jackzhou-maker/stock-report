<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jack's Market Hub</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0}
.tabs{display:flex;background:#1e293b;border-bottom:2px solid #334155;position:sticky;top:0;z-index:100}
.tab-btn{flex:1;padding:14px 8px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:#64748b;border:none;background:none;transition:all .2s;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab-btn:hover{color:#e2e8f0}
.tab-btn.active{color:#f8fafc;border-bottom-color:#4caf50}
.tab-frame{display:none;width:100%;height:calc(100vh - 57px);border:none;background:#fff}
.tab-frame.active{display:block}
/* index page styles (预报首页) */
.a{max-width:1200px;margin:0 auto;padding:24px 20px}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:24px 32px;border-bottom:1px solid #1f2937;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:24px;color:#fff}
.header h1 span{color:#4caf50}
.header .date{font-size:13px;color:#888}
.main{padding:24px 20px;max-width:1200px;margin:0 auto}
.section{background:#111827;border-radius:16px;padding:20px;margin-bottom:20px;border:1px solid #1f2937}
.section-title{font-size:16px;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:8px}
table{width:100%;border-collapse:collapse;margin-top:12px}
th{text-align:left;font-size:11px;color:#666;text-transform:uppercase;padding:8px 10px;background:#0d1117;border-bottom:1px solid #1f2937}
td{padding:10px 10px;font-size:13px;border-bottom:1px solid #1a1f2e}
tr:hover{background:#1a2030;cursor:pointer}
.up{color:#4caf50;font-weight:600}
.down{color:#f44336}
.s-badge{margin-right:6px;font-size:14px}
.btc-banner{background:linear-gradient(135deg,#1a2a1a,#0d1f0d);border:1px solid #1b5e20;border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.btc-price{font-size:28px;font-weight:700;color:#4caf50}
.btc-info{font-size:12px;color:#888;line-height:1.8}
.btc-badge{background:#1b5e20;color:#4caf50;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.nav{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}
.nav a{background:#1f2937;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px}
.nav a:hover{background:#374151}
.footer{text-align:center;color:#333;font-size:11px;padding:20px}
</style>
</head>
<body>

<!-- Tab Navigation -->
<div class="tabs">
  <button class="tab-btn active" data-tab="home" onclick="showTab(this)">📊 预报首页</button>
  <button class="tab-btn" data-tab="chart" onclick="showTab(this)">📈 预测图表</button>
  <button class="tab-btn" data-tab="btc" onclick="showTab(this)">₿ BTC交易</button>
</div>

<!-- TAB 1: 预报首页 -->
<div id="tab-home" class="tab-frame active">
<div class="header">
  <div>
    <h1>📊 <span>Jack's</span> Market Hub</h1>
    <div class="date">2026-04-18 GMT+8 | 数据来源: Yahoo Finance</div>
  </div>
  <div class="nav">
    <a href="stock_report.html" target="_blank">📈 股票快报</a>
    <a href="stock_forecast_chart.html" target="_blank">📊 预报图表</a>
    <a href="btc_trading_page.html" target="_blank">₿ BTC交易</a>
  </div>
</div>

<div class="main">
  <div class="btc-banner">
    <div class="btc-price" id="btc-price">Loading...</div>
    <div class="btc-info" id="btc-info">BTC/USDT 行情加载中</div>
    <div class="btc-badge" id="btc-signal">信号: --</div>
  </div>

  <!-- 买入/卖出快览 -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
    <div class="section" style="border-left:3px solid #22c55e">
      <div class="section-title" style="color:#22c55e">🟢 买入信号</div>
      <div id="buy-rows" style="font-size:12px;color:#94a3b8;text-align:center">加载中...</div>
    </div>
    <div class="section" style="border-left:3px solid #ef4444">
      <div class="section-title" style="color:#ef4444">🔴 卖出/观望</div>
      <div id="sell-rows" style="font-size:12px;color:#94a3b8;text-align:center">加载中...</div>
    </div>
  </div>
    

  <div class="section">
    <div class="section-title">📈 <span>↑</span> 次日价格预报 Top5 | 点击行查看完整图表</div>
    <table>
      <thead><tr><th>股票</th><th>现价</th><th>明日期望</th><th>68%区间</th><th>上涨概率</th><th>RSI</th><th>年化波幅</th></tr></thead>
      <tbody id="forecast-rows"><tr><td colspan="7" style="text-align:center;color:#666">加载中...</td></tr></tbody>
    </table>
  </div>

  <div class="section">
    <div class="section-title">🛎️ ★ 股票信号 Top5 | 技术面(40%) + 机构面(40%) + RSI修正</div>
    <table>
      <thead><tr><th>信号</th><th>现价</th><th>上涨空间</th><th>置信度</th><th>RSI</th><th>评级</th></tr></thead>
      <tbody id="signal-rows"><tr><td colspan="6" style="text-align:center;color:#666">加载中...</td></tr></tbody>
    </table>
  </div>
</div>
</div>

<!-- TAB 2: 预测图表 -->
<iframe id="tab-chart" class="tab-frame" src="stock_forecast_chart.html"></iframe>

<!-- TAB 3: BTC交易 -->
<iframe id="tab-btc" class="tab-frame" src="btc_trading_page.html"></iframe>

<script>
// ── Tab Switching ───────────────────────────────
function showTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-frame').forEach(f => f.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
}

// ── Load Forecast Data ─────────────────────────
async function loadData() {
  try {
    const [fRes, sRes] = await Promise.all([
      fetch('stock_forecast_data.json'),
      fetch('stock_signal_data.json')
    ]);
    const forecast = await fRes.json();
    const signals = await sRes.json();

    // Forecast rows
    const fRows = document.getElementById('forecast-rows');
    if (fRows && forecast.length) {
      const top = [...forecast].sort((a,b)=>b.p_up-a.p_up).slice(0,5);
      fRows.innerHTML = top.map(r => {
        const sig = r.p_up>=0.52?'🟢':r.p_up>=0.48?'🟡':'🔴';
        const rsiC = r.rsi<70?'#4caf50':r.rsi<85?'#ff9800':'#f44336';
        return `<tr onclick="window.open('stock_forecast_chart.html','_blank')">
          <td><span class="s-badge">${sig}</span>${r.symbol}</td>
          <td>$${r.price.toFixed(2)}</td>
          <td>$${r.expected.toFixed(2)}</td>
          <td>$${r.r68_lo.toFixed(0)}~$${r.r68_hi.toFixed(0)}</td>
          <td class="up">${(r.p_up*100).toFixed(0)}%</td>
          <td style="color:${rsiC}">${r.rsi.toFixed(0)}</td>
          <td>${r.ann_vol.toFixed(0)}%</td>
        </tr>`;
      }).join('');
    }

    // Buy/Sell quick view
    const buyRows = document.getElementById('buy-rows');
    const sellRows = document.getElementById('sell-rows');
    if (buyRows || sellRows) {
      const buy = signals.filter(r => r.rec === 'buy' || r.signal.includes('买入')).slice(0,5);
      const sell = signals.filter(r => r.rec === 'sell' || r.signal.includes('卖出') || r.signal.includes('减持') || r.rec === 'hold').slice(0,5);
      if (buyRows) {
        buyRows.innerHTML = buy.length ? buy.map(r => `
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1f2937">
            <span style="color:#fff;font-weight:600">${r.symbol}</span>
            <span style="color:#22c55e">${r.upside>=0?'+':''}${r.upside.toFixed(0)}%</span>
            <span style="color:#888">${r.rec} · ${r.confidence}%</span>
          </div>`).join('') : '<div style="padding:10px;color:#666">暂无买入信号</div>';
      }
      if (sellRows) {
        sellRows.innerHTML = sell.length ? sell.map(r => `
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1f2937">
            <span style="color:#fff;font-weight:600">${r.symbol}</span>
            <span style="color:#ef4444">${r.upside>=0?'+':''}${r.upside.toFixed(0)}%</span>
            <span style="color:#888">${r.rec} · ${r.confidence}%</span>
          </div>`).join('') : '<div style="padding:10px;color:#666">暂无卖出信号</div>';
      }
    }

    // Signal rows
    const sRows = document.getElementById('signal-rows');
    if (sRows && signals.length) {
      const top = signals.slice(0,5);
      sRows.innerHTML = top.map(r => `
        <tr>
          <td>${r.signal} ${r.symbol}</td>
          <td>$${r.price.toFixed(2)}</td>
          <td class="${r.upside>=0?'up':'down'}">${r.upside>=0?'+':''}${r.upside.toFixed(0)}%</td>
          <td>${r.confidence}%</td>
          <td>${r.rsi.toFixed(0)}</td>
          <td>${r.rec}</td>
        </tr>`).join('');
    }
  } catch(e) { console.warn('Data load failed:', e); }

  // BTC price via yfinance (CORS-safe)
  try {
    const r = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/BTC-USD?interval=1d&range=1d');
    const d = await r.json();
    const price = d.chart.result[0].meta.regularMarketPrice;
    const prev = d.chart.result[0].meta.previousClose;
    const chg = ((price - prev) / prev * 100).toFixed(2);
    document.getElementById('btc-price').textContent = '$' + price.toLocaleString();
    document.getElementById('btc-info').textContent = `24h: ${chg>=0?'+':''}${chg}% | ${new Date().toLocaleTimeString()}`;
    document.getElementById('btc-signal').textContent = '信号: 实时';
  } catch(e) {
    document.getElementById('btc-price').textContent = '$ --';
    document.getElementById('btc-info').textContent = '价格加载失败';
  }
}

loadData();
</script>
</body>
</html>
