<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jack's Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0}
.tabs{display:flex;background:#1e293b;border-bottom:2px solid #334155;position:sticky;top:0;z-index:100}
.tab-btn{flex:1;padding:14px 8px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:#64748b;border:none;background:none;transition:all .2s;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab-btn:hover{color:#e2e8f0}
.tab-btn.active{color:#f8fafc;border-bottom-color:#3b82f6}
.tab-frame{display:none;width:100%;height:calc(100vh - 60px);border:none}
.tab-frame.active{display:block}
iframe{background:#fff}
</style>
</head>
<body>

<!-- Tab Navigation -->
<div class="tabs">
  <button class="tab-btn active" data-tab="report" onclick="switchTab(this)">📈 股票快报</button>
  <button class="tab-btn" data-tab="btc" onclick="switchTab(this)">₿ BTC交易</button>
  <button class="tab-btn" data-tab="forecast" onclick="switchTab(this)">📊 次日预报</button>
</div>

<!-- Tab Frames -->
<iframe id="frame-report" class="tab-frame active" src="stock_report.html"></iframe>
<iframe id="frame-btc" class="tab-frame" src="btc_trading_page.html"></iframe>
<iframe id="frame-forecast" class="tab-frame" src="stock_forecast_chart.html"></iframe>

<script>
function switchTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-frame').forEach(f => f.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('frame-' + btn.dataset.tab).classList.add('active');
}
</script>
</body>
</html>
